<h1 id="video-llm-%E8%A7%86%E8%A7%89-token-%E5%8E%8B%E7%BC%A9">Video LLM 视觉 Token 压缩</h1>
<h2 id="%E6%96%87%E7%8C%AE%E7%B2%BE%E8%AF%BB%E4%B8%8E%E5%A4%8D%E7%8E%B0%E8%BF%9B%E5%B1%95%E6%B1%87%E6%8A%A5">文献精读与复现进展汇报</h2>
<p><strong>汇报人</strong>：张同学<br />
<strong>方向</strong>：高效 Video LLM 推理（Training-free Token Compression）<br />
<strong>数据来源</strong>：孙国磊老师提供的论文列表（45篇，聚焦 2024–2026）</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" lang="en-US">
<h1 id="%E4%B8%BA%E4%BB%80%E4%B9%88%E7%A0%94%E7%A9%B6%E8%BF%99%E4%B8%AA%E6%96%B9%E5%90%91">为什么研究这个方向？</h1>
<ul>
<li><strong>痛点</strong>：Video LLM 将多帧视频编码为大量 visual tokens（32帧 × 每帧数百 token → 数万 token），LLM 注意力复杂度为 <strong>O(n²)</strong>，推理慢、显存高</li>
<li><strong>目标</strong>：在 <strong>不微调模型</strong> 的前提下压缩 token，兼顾精度与效率</li>
<li><strong>应用场景</strong>：MVBench、VideoMME、EgoSchema、LongVideoBench 等视频理解 benchmark</li>
<li><strong>我的工作路径</strong>：先 <strong>复现</strong> 核心论文 → 再 <strong>精读对比</strong> → 面试讨论</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" lang="en-US">

</ul>

<h1 id="%E8%AE%BA%E6%96%87-%E2%91%A0-prunevidiclr-2025">论文 ① PruneVid（ICLR 2025）</h1>
<h2 id="visual-token-pruning-for-efficient-video-llms">Visual Token Pruning for Efficient Video LLMs</h2>
<p><strong>作者</strong>：港大 Visual AI Lab + 百度<br />
<strong>arXiv</strong>：2412.16117 | <strong>代码</strong>：github.com/Visual-AI/PruneVid（71 stars）</p>
<p><strong>三大设计原则</strong>：</p>
<ol>
<li><strong>Training-free</strong>，即插即用</li>
<li>压缩 <strong>视频固有冗余</strong>（时空相似）</li>
<li>保留与 <strong>问题相关</strong> 的 visual tokens</li>
</ol>
<p><strong>两阶段流水线</strong>：</p>
<ul>
<li>Stage A：<strong>Pre-LLM</strong> 时空 token 合并</li>
<li>Stage B：<strong>LLM 内</strong> 问题引导剪枝 + KV cache 压缩</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" lang="en-US">
<h1 id="prunevid-%E6%96%B9%E6%B3%95%E8%AF%A6%E8%A7%A3">PruneVid 方法详解</h1>
<p><strong>Stage A — 时空合并</strong>：</p>
<ol>
<li>DPC-KNN 将帧聚为 B 个时序段</li>
<li>段内：cosine 相似度 &gt; τ 的 <strong>静态 token</strong> 做时序平均</li>
<li>每帧：对静态/动态 token 分别 DPC-KNN 空间聚类 → 簇内平均</li>
</ol>
<p><strong>Stage B — LLM 引导剪枝</strong>：</p>
<ul>
<li>在第 M 层（默认第 10 层）计算 <strong>问题→视觉</strong> cross-attention</li>
<li>保留 attention Top-α%（α=0.4）的视觉 token</li>
<li>前 M 层 KV cache 同步压缩 → 加速 decode</li>
</ul>
<p><strong>效果</strong>：剪除 <strong>&gt;80%</strong> token，FLOPs ↓74–80%，TTFT ↑1.55×</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" lang="en-US">
<h1 id="prunevid-%E5%AE%9E%E9%AA%8C%E4%B8%8E%E5%A4%8D%E7%8E%B0">PruneVid 实验与复现</h1>
<p><strong>论文结果</strong>（PLLaVA-7B 等）：</p>
<ul>
<li>MVBench <strong>47.6</strong>、VideoMME <strong>45.3</strong>、EgoSchema <strong>49.0</strong>（subset）</li>
<li>在后续 AOT 论文 Table 1 中仍是强 baseline（LLaVA-OV R=25%: avg <strong>98.6%</strong>）</li>
</ul>
<p><strong>我的复现</strong>（进行中）：</p>
<ul>
<li>VideoMME：<strong>44.89</strong> vs 论文 45.0（Δ <strong>-0.11</strong>）✓</li>
<li>MVBench / EgoSchema fullset：运行中</li>
<li>评价：实现细节敏感（层数 M、τ、γ、β 超参）</li>
</ul>
<p><strong>特点小结</strong>：最早系统地把 <strong>视频冗余压缩</strong> 和 <strong>问题相关剪枝</strong> 结合起来</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" lang="en-US">
<h1 id="%E8%AE%BA%E6%96%87-%E2%91%A1-vidcom%C2%B2emnlp-2025">论文 ② VidCom²（EMNLP 2025）</h1>
<h2 id="video-compression-commander">Video Compression Commander</h2>
<p><strong>arXiv</strong>：2505.14454 | <strong>代码</strong>：github.com/xuyang-liu16/VidCom2（125 stars）</p>
<p><strong>核心问题</strong>（论文自陈）：</p>
<ol>
<li>均匀压缩各帧 → <strong>忽略帧间差异性</strong>，信息损失</li>
<li>部分方法不兼容 FlashAttention 等高效算子</li>
</ol>
<p><strong>设计原则</strong> → <strong>两阶段框架</strong>：</p>
<ul>
<li><strong>Stage 1</strong>：Frame Compression Adjustment（帧级预算分配）</li>
<li><strong>Stage 2</strong>：Adaptive Token Compression（token 级 TopK）</li>
</ul>
<p><strong>与 PruneVid 的区别</strong>：全程 <strong>Pre-LLM</strong>，不做 LLM 内剪枝；强调 <strong>帧级差异化</strong> 而非静态/动态分离</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" lang="en-US">
<h1 id="vidcom%C2%B2-%E6%96%B9%E6%B3%95%E8%AF%A6%E8%A7%A3">VidCom² 方法详解</h1>

<h1 id="%E8%AE%BA%E6%96%87-%E2%91%A2-aotcvpr-2026">论文 ③ AOT（CVPR 2026）</h1>
<h2 id="token-reduction-via-local-and-global-contexts-optimization">Token Reduction via Local and Global Contexts Optimization</h2>
<p><strong>arXiv</strong>：2603.01400 | <strong>代码</strong>：github.com/TyroneLi/AOT</p>
<p><strong>全称</strong>：Anchors + Optimal Transport<br />
<strong>核心问题</strong>：PruneVid / VidCom² 等方法在「删掉/合并」token 时，<strong>丢失被删 token 中的细粒度语义</strong></p>
<p><strong>关键洞察</strong>：</p>
<ul>
<li>不是简单丢弃低分 token，而是选 <strong>Anchor（锚点）</strong>，用 <strong>最优传输（OT）</strong> 把被删 token 的信息 <strong>聚合</strong> 到锚点上</li>
<li>分 <strong>帧内（Intra）</strong> 和 <strong>帧间（Inter）</strong> 两阶段，兼顾空间多样性与时序动态</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" lang="en-US">
<h1 id="aot-%E6%96%B9%E6%B3%9512%E9%94%9A%E7%82%B9%E9%80%89%E5%8F%96">AOT 方法（1/2）：锚点选取</h1>
<p><strong>Global Anchors</strong>：ViT 最后一层，按 [CLS] attention Top-K 选全局重要 token<br />

<pre is="marp-pre" data-auto-scaling="downscale-only"><code>PruneVid (ICLR'25)          VidCom² (EMNLP'25)         AOT (CVPR'26)
─────────────────          ──────────────────         ──────────────
时空合并 +                  帧级自适应                  OT 聚合替代
LLM 问题剪枝        →      Pre-LLM TopK        →      简单丢弃/合并
Hybrid 路线                 兼容 FlashAttn              保留被删语义
</code></pre>
<p><strong>趋势</strong>：</p>
<ol>
<li>从 <strong>均匀压缩</strong> → <strong>帧/token 级自适应</strong></li>
<li>从 <strong>LLM 内剪枝</strong> → <strong>Pre-LLM 压缩</strong>（VidCom²、AOT）</li>
<li>从 <strong>直接丢弃</strong> → <strong>信息聚合保留</strong>（AOT 的 OT）</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" lang="en-US">
<h1 id="%E9%9D%A2%E8%AF%95%E5%8F%AF%E8%AE%A8%E8%AE%BA%E7%9A%84%E9%97%AE%E9%A2%98">面试可讨论的问题</h1>
<ol>
<li><strong>PruneVid 的 text-guided 剪枝 vs AOT 的 text-agnostic</strong>：为何 AOT 在 EgoSchema 上反而更强？</li>
<li><strong>VidCom² 能否与 PruneVid / AOT 组合</strong>：帧级调度 + OT 聚合是否互补？</li>
<li><strong>复现 gap</strong>：AOT VideoMME -2.8pt 可能来自帧数、随机种子、还是数据版本？</li>
<li><strong>评价协议</strong>：EgoSchema 必须走 validation server；三篇论文 benchmark 设置不完全一致</li>
<li><strong>下一步</strong>：是否在复现基础上做 ablation 或提出改进？</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" lang="en-US">
<h1 id="%E6%80%BB%E7%BB%93%E4%B8%8E%E4%B8%8B%E4%B8%80%E6%AD%A5%E8%AE%A1%E5%88%92">总结与下一步计划</h1>
